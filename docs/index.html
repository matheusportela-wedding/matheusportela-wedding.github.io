y you’re here. After years of shared coffees, long trips and a life built between two countries, we’re finally throwing the party — and we want you in it.",p2:"This little site has everything you need: the day itself, how to reach Brasília, what to see while you’re in Brazil, and how to say yes. Take your time and explore."},party:{eyebrow:"Those who walk with us",title:"Our People",namePh:"Name Surname",intro:"The people who shaped our story and will stand beside us on the day. (Names below are placeholders — send us the final list.)",groups:[{group:"Honour Attendants",people:[["Name Surname","Maid of Honour"],["Name Surname","Best Man"]]},{group:"Bridesmaids",people:[["Name Surname","Bridesmaid"],["Name Surname","Bridesmaid"],["Name Surname","Bridesmaid"],["Name Surname","Bridesmaid"]]},{group:"Groomsmen",people:[["Name Surname","Groomsman"],["Name Surname","Groomsman"],["Name Surname","Groomsman"],["Name Surname","Groomsman"]]}]},event:{eyebrow:"The big day",title:"The Wedding",intro:"An open-air ceremony followed by dinner and dancing, in a green hideaway minutes from central Brasília.",ceremony:{tag:"Ceremony",time:"4 PM",desc:"In the open garden, beneath the timber frame. Arrive from 3:30 PM for a cold coconut water."},reception:{tag:"Reception",time:"6 PM",desc:"Dinner, toasts and a dance floor in the hall next door — until dawn, for those who last."},rows:[["Location",`Espaço Renascença

+ months. Always confirm with official government sources."]],["When to book","Late December is peak Brazilian summer and holiday season — plan ahead.",["Flights: book 4–6 months out for the best fares.","Hotels: reserve early; the city fills around New Year.","e-Visa: apply at least 3 weeks before departure."]]]},newyear:{eyebrow:"Make a holiday of it",title:"Réveillon in Brazil",photo:"réveillon · fireworks on the beach",p:["Our wedding lands two days before New Year’s Eve — the perfect excuse to stay and celebrate ","Réveillon",", Brazil’s biggest party. Tradition says: dress in white for peace, jump seven waves at midnight, and watch fireworks light up the coast."],places:[["Rio de Janeiro","Copacabana beach — ~2 million in white, fireworks over the bay. ~1h45 flight from Brasília."],["Florianópolis & Búzios","Beach-town glamour and all-night parties on the southern and Rio coasts."],["Salvador & São Paulo","Afro-Brazilian rhythm on the beach, or Av. Paulista’s street celebration."]]},city:{eyebrow:"Where you’re headed",title:"Brasília & Brazil",photo:"brasília · modernist skyline",intro:"A little about the city — and the country — for those visiting Brazil for the first time.",whatTitle:"What is Brasília?",whatP:"Brazil’s capital was built from open savanna and inaugurated in 1960 — a modernist city imagined by urban planner Lúcio Costa and architect Oscar Niemeyer, laid out in the shape of an aeroplane. Its sweeping concrete-and-glass landmarks earned it UNESCO World Heritage status, and it’s unlike anywhere else on earth.",seeLabel:"Things to see & do",sights:[["Cathedral of Brasília","Niemeyer’s crown of light"],["National Congress","The twin towers & domes"],["Praça dos Três Poderes","Heart of the capital"],["JK Memorial","The city’s founder"],["Itamaraty Palace","Water gardens & arches"],["Pontão do Lago Sul","Sunset dining by the lake"]],foodTitle:"Food & culture",foodP:"Come hungry: sizzling churrasco, warm pão de queijo, brigadeiros and ice-cold caipiri
